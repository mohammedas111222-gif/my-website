<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا نور</title>
    <style>
        :root {
            --bg1: #ffafbd;
            --bg2: #ffc3a0;
            --text: #3a2030;
            --accent: #fe6b8b;
            --light: #fff8f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.7), transparent 30%),
                        linear-gradient(135deg, var(--bg1), var(--bg2));
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(860px, 100%);
            padding: 40px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.18);
            text-align: center;
            overflow: hidden;
        }

        .page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,0.5), transparent 25%),
                        radial-gradient(circle at right, rgba(254,107,139,0.1), transparent 20%);
            pointer-events: none;
        }

        .page h1 {
            font-size: clamp(3rem, 5vw, 5rem);
            margin: 0;
            letter-spacing: 0.12em;
            color: var(--accent);
            text-shadow: 0 10px 25px rgba(254, 107, 139, 0.24);
        }

        .page .subtitle {
            margin: 12px 0 24px;
            font-size: 1.1rem;
            color: #7b5a70;
        }

        .page .message {
            margin: 0 auto;
            max-width: 720px;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #5b4356;
        }

        .page .gift {
            font-size: 1rem;
            margin: 30px auto 0;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 26px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(254, 107, 139, 0.18), rgba(255, 255, 255, 0.75));
            color: var(--accent);
            border: 1px solid rgba(254, 107, 139, 0.18);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
        }

        .page .gift:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(254, 107, 139, 0.18);
        }

        .balloon,
        .heart {
            position: absolute;
            border-radius: 50% 50% 55% 55%;
            opacity: 0.95;
            animation: float 6s ease-in-out infinite;
        }

        .balloon {
            width: 110px;
            height: 150px;
            background: radial-gradient(circle at top, #fff 15%, #ff85a1 55%, #fe6b8b 100%);
            left: 12%;
            top: 18%;
            animation-delay: 0s;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -36px;
            left: 50%;
            width: 2px;
            height: 36px;
            background: rgba(58, 32, 48, 0.2);
            transform: translateX(-50%);
        }

        .balloon.two {
            width: 90px;
            height: 120px;
            left: 80%;
            top: 10%;
            background: radial-gradient(circle at top, #fff 18%, #a06cff 55%, #9058d1 100%);
            animation-duration: 7s;
            animation-delay: 0.8s;
        }

        .balloon.three {
            width: 80px;
            height: 110px;
            left: 24%;
            top: 66%;
            background: radial-gradient(circle at top, #fff 20%, #ffd65a 55%, #f8b500 100%);
            animation-duration: 5.5s;
            animation-delay: 1.1s;
        }

        .heart {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff8abf, #ff5b94);
            left: 85%;
            top: 68%;
            clip-path: path('M40 72 C 20 78 0 60 0 40 C 0 16 16 0 40 18 C 64 0 80 16 80 40 C 80 60 60 78 40 72 Z');
            animation-duration: 6.5s;
            animation-delay: 0.3s;
        }

        .heart.small {
            width: 55px;
            height: 55px;
            left: 8%;
            top: 74%;
            animation-duration: 5.4s;
            animation-delay: 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-16px); }
        }

        @media (max-width: 640px) {
            .page { padding: 30px 20px; }
            .page .gift { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="page">
        <p class="subtitle">هدية صغيرة لقلبي</p>
        <h1>نور</h1>
        <p class="message">كل سنة وأنتِ فرحة قلبي ونور حياتي. إن شاء الله يكون عيدك هذا أجمل سنة، مليانة حب، ضحك، وسعادة غير محدودة. أحبك أكثر من أي كلام.</p>
        <a class="gift" href="#" onclick="showSurprise(); return false;">اضغطي هون للمفاجأة</a>
    </div>
    <div class="balloon"></div>
    <div class="balloon two"></div>
    <div class="balloon three"></div>
    <div class="heart"></div>
    <div class="heart small"></div>
    <script>
        function showSurprise() {
            alert('عيد ميلاد سعيد يا نور! 🎂✨ كل سنة وأنتِ بألف خير.');
        }
    </script>
</body>
</html>
